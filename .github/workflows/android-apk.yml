name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      channel:
        description: APK channel to build
        required: true
        default: live
        type: choice
        options:
          - live
          - preview

permissions:
  contents: write
  actions: read

jobs:
  build-live:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.channel == 'live')
    uses: ./.github/workflows/android-apk-template.yml
    secrets: inherit
    with:
      channel: live
      gradle_flavor: Live
      release_tag: orderfast-android-live
      asset_name: orderfast-android-live.apk
      app_channel_env: live

  build-preview:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.channel == 'preview')
    uses: ./.github/workflows/android-apk-template.yml
    secrets: inherit
    with:
      channel: preview
      gradle_flavor: Preview
      release_tag: orderfast-android-preview
      asset_name: orderfast-android-preview.apk
      app_channel_env: preview
