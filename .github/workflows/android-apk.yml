name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Create temporary Capacitor web assets
        run: |
          mkdir -p www
          cat > www/index.html <<'EOF'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Orderfast</title>
            </head>
            <body>
              <div id="app">Temporary Capacitor bootstrap page</div>
            </body>
          </html>
          EOF

      - name: Temporarily point Capacitor to www
        run: |
          node -e "const fs=require('fs'); const p='capacitor.config.ts'; let s=fs.readFileSync(p,'utf8'); s=s.replace(/webDir:\s*['\"][^'\"]+['\"]/,'webDir: '\''www'\'''); fs.writeFileSync(p,s);"

      - name: Generate Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "android folder already exists, skipping generation"
          fi

      - name: Commit Android platform if newly generated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android package.json package-lock.json capacitor.config.ts www
          if ! git diff --cached --quiet; then
            git commit -m "chore: add Capacitor Android platform"
            git push
          else
            echo "No changes to commit"
          fi
