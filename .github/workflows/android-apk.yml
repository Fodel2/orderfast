name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      KIOSK_RELEASE_TAG: kiosk-debug-testing
      KIOSK_RELEASE_ASSET_NAME: orderfast-kiosk-debug.apk

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Create temporary Capacitor web assets
        run: |
          mkdir -p www
          cat > www/index.html <<'EOF2'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Orderfast</title>
            </head>
            <body>
              <div id="app">Temporary Capacitor bootstrap page</div>
            </body>
          </html>
          EOF2

      - name: Temporarily point Capacitor to www
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path("capacitor.config.ts")
          s = p.read_text()
          s = s.replace("webDir: '.next'", "webDir: 'www'")
          s = s.replace('webDir: ".next"', 'webDir: "www"')
          p.write_text(s)
          print("Updated capacitor.config.ts to use webDir = www")
          PY

      - name: Generate Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "android folder already exists, skipping generation"
          fi

      - name: Commit Android platform if newly generated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android package.json package-lock.json capacitor.config.ts www
          if ! git diff --cached --quiet; then
            git commit -m "chore: add Capacitor Android platform"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Prepare kiosk release asset
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk "$KIOSK_RELEASE_ASSET_NAME"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: orderfast-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload kiosk debug APK to stable GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.KIOSK_RELEASE_TAG }}
          name: Kiosk Debug APK (Testing)
          prerelease: true
          make_latest: false
          files: ${{ env.KIOSK_RELEASE_ASSET_NAME }}
